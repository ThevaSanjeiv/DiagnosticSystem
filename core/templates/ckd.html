    function determineCKDStage(eGFR, ACR) {
      if (eGFR >= 90) {
        if (ACR < 30) {
          return "Normal";
        }
        return "1";
      }
      if (eGFR >= 60) return "2";
      if (eGFR >= 45) return "3A";
      if (eGFR >= 30) return "3B";
      if (eGFR >= 15) return "4";
      return "5";
    }

    async function diagnose() {
      const eGFR = parseFloat(document.getElementById('eGFR').value);
      const ACR = parseFloat(document.getElementById('ACR').value);
      const creatinine = parseFloat(document.getElementById('creatinine').value);
      const urea = parseFloat(document.getElementById('urea').value);
      const hemoglobin = parseFloat(document.getElementById('hemoglobin').value);

      if (isNaN(eGFR) || isNaN(ACR) || isNaN(creatinine) || isNaN(urea) || isNaN(hemoglobin)) {
        document.getElementById('result').innerHTML = 'Please enter valid numbers for all fields.';
        document.getElementById('result').className = 'result';
        document.getElementById('downloadPdf').style.display = 'none';
        return;
      }

      document.getElementById('result').innerHTML = 'Analyzing...';
      document.getElementById('result').className = 'result';
      document.getElementById('downloadPdf').style.display = 'none';

      const pyData = {
        age: 50, // default if not in UI
        bp: 80,
        sg: 1.020,
        al: ACR,
        su: 0,
        urea: urea,
        creatinine: creatinine,
        eGFR: eGFR,
        hemoglobin: hemoglobin
      };

      try {
        const resp = await fetch('/core_api/predict/ckd/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(pyData)
        });
        const jsonResp = await resp.json();
        if (jsonResp.status === 'success') {
          hasCKD = jsonResp.hasCKD;
          ckdStage = determineCKDStage(eGFR, ACR);

          if (ckdStage === "Normal") {
            hasCKD = false;
          }

          if (ckdStage === "Normal") {
            diagnosisResult = `<strong class="negative">Result: ${stageInfo[ckdStage].text}</strong><br>
                                     <strong>Severity: <span style="color: #2E7D32;">${stageInfo[ckdStage].risk}</span></strong>`;
          } else {
            diagnosisResult = `<strong class="positive">Result: ${stageInfo[ckdStage].text}</strong><br>
                                     <strong>Severity: <span style="color: #d32f2f;">${stageInfo[ckdStage].risk}</span></strong><br>
                                     Please consult a doctor for proper management.`;
          }
          document.getElementById('result').innerHTML = diagnosisResult;
          document.getElementById('downloadPdf').style.display = 'block';
        } else {
          document.getElementById('result').innerHTML = 'Error: ' + jsonResp.message;
        }
      } catch (err) {
        document.getElementById('result').innerHTML = 'Network error connecting to Backend ML API.';
      }
    }
    function generatePDF() {

      let yPosition = 45;

      // Draw table headers

      doc.setFillColor(230, 230, 250);
      doc.rect(20, yPosition, 80, 10, 'F'); // Label cell
      doc.rect(100, yPosition, 80, 10, 'F'); // Value cell
      doc.setTextColor(0, 0, 0);
      doc.text('Parameter', 25, yPosition + 7);
      doc.text('Value', 105, yPosition + 7);

      yPosition += 12;

      // Add table rows
      inputs.forEach(input => {
        const value = document.getElementById(input.id).value;
        doc.rect(20, yPosition, 80, 10); // Label cell
        doc.rect(100, yPosition, 80, 10); // Value cell
        doc.text(input.label, 25, yPosition + 7);
        doc.text(value || '-', 105, yPosition + 7);
        yPosition += 12;
      });

      // Uploaded PDF note
      if (uploadedPdfFile) {
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text(`Medical report uploaded: ${uploadedPdfFile.name}`, 20, yPosition + 5);
        yPosition += 10;
      }

      // Diagnosis Result
      doc.setFontSize(16);
      doc.setTextColor(0, 0, 0);
      doc.text('Diagnosis Result', 20, yPosition + 15);

      doc.setFontSize(14);
      if (ckdStage === "Normal") {

        doc.text(stageInfo[ckdStage].text, 20, yPosition + 25);
        doc.setFontSize(12);

        doc.setFontSize(12);
        doc.text(`Severity: ${stageInfo[ckdStage].risk}`, 20, yPosition + 32);
        doc.text('Please consult a doctor for proper management.', 20, yPosition + 39);
        yPosition += 47;
      }

      // Interpretation Guidelines Table
      doc.setFontSize(16);
      doc.setTextColor(0, 0, 0);
      doc.text('Interpretation Guidelines', 20, yPosition);

      yPosition += 10;
      // const guidelines = [
      //   'eGFR < 60: Possible kidney impairment',
      //   'ACR ≥ 30: Possible kidney damage',
      //   'Creatinine > 1.2 mg/dL: Possible issue',
      //   'Urea > 40 mg/dL: Possible issue',
      //   'Hemoglobin < 12 g/dL: Possible anemia'
      // ];
      const guidelines = [
        'eGFR < 60: Possible kidney impairment',
        'ACR >= 30: Possible kidney damage',
        'Creatinine > 1.2 mg/dL: Possible issue',
        'Urea > 40 mg/dL: Possible issue',
        'Hemoglobin < 12 g/dL: Possible anemia'
      ];

      guidelines.forEach(g => {
        doc.setFontSize(11);
        doc.text(`• ${g}`, 25, yPosition);
        yPosition += 7;
      });

      yPosition += 10;

      // CKD Treatment Plan in table format
      if (ckdStage && ckdTreatmentPlans[ckdStage]) {
        doc.setFontSize(16);
        doc.setTextColor(0, 0, 0);
        doc.text('Personalized Treatment Plan', 20, yPosition);
        yPosition += 10;

        doc.setFontSize(13);
        doc.setTextColor(106, 17, 203);
        doc.text(ckdTreatmentPlans[ckdStage].title, 20, yPosition);
        yPosition += 8;

        doc.setFontSize(11);
        doc.setTextColor(0, 0, 0);

        ckdTreatmentPlans[ckdStage].recommendations.forEach((rec) => {
          if (yPosition > 270) {
            doc.addPage();
            yPosition = 20;
          }
          const splitRec = doc.splitTextToSize(`• ${rec}`, 170);
          doc.text(splitRec, 25, yPosition);
          yPosition += splitRec.length * 6;
        });
        yPosition += 6;
      }

      // Nutrition Recommendations
      doc.setFontSize(16);
      doc.setTextColor(0, 0, 0);
      doc.text('Nutrition Recommendations', 20, yPosition);
      yPosition += 10;

      let riskKey = "healthy";
      if (ckdStage === "1" || ckdStage === "2" || ckdStage === "3A" || ckdStage === "3B") {
        riskKey = "moderateRisk";
      } else if (ckdStage === "4" || ckdStage === "5") {
        riskKey = "highRisk";
      }

      const recs = ckdNutritionRecommendations[riskKey];

      if (recs) {
        doc.setFontSize(13);
        doc.setTextColor(106, 17, 203);
        doc.text(recs.title, 20, yPosition);
        yPosition += 8;

        const addSection = (title, items) => {
          if (!items || items.length === 0) return;
          if (yPosition > 270) { doc.addPage(); yPosition = 20; }
          doc.setFontSize(12);
          doc.setTextColor(0, 0, 0);
          doc.text(title, 20, yPosition);
          yPosition += 7;
          doc.setFontSize(11);
          items.forEach(item => {
            if (yPosition > 270) { doc.addPage(); yPosition = 20; }
            const splitItem = doc.splitTextToSize(`• ${item}`, 170);
            doc.text(splitItem, 25, yPosition);
            yPosition += splitItem.length * 6;
          });
          yPosition += 4;
        };

        addSection("Recommended Foods:", recs.recommendedFoods);
        addSection("Foods to Avoid:", recs.foodsToAvoid);
        addSection("Lifestyle Recommendations:", recs.lifestyleRecommendations);
      }

      // Footer
      doc.setFontSize(10);
      doc.setTextColor(100, 100, 100);
      doc.text(`Report generated on: ${new Date().toLocaleDateString()}`, 20, 285);
      doc.text('Disclaimer: This is a demo tool, not a medical diagnosis.', 20, 290);

      doc.save('ckd-diagnosis-report.pdf');
    }

    function createBubbles() {
      const background = document.querySelector('.background-animation');
      for (let i = 0; i < 15; i++) {
        let bubble = document.createElement('div');
        bubble.classList.add('bubble');
        let size = Math.random() * 50 + 20;
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        bubble.style.left = `${Math.random() * 100}vw`;
        bubble.style.animationDuration = `${Math.random() * 4 + 3}s`;
        bubble.style.animationDelay = `${Math.random() * 3}s`;
        background.appendChild(bubble);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      const uploadBtn = document.getElementById('uploadBtn');
      const pdfUpload = document.getElementById('pdfUpload');
      const uploadedPdf = document.getElementById('uploadedPdf');
      const pdfFileName = document.getElementById('pdfFileName');
      const extractionStatus = document.getElementById('extractionStatus');
      const dataPreview = document.getElementById('dataPreview');
      const manualEntry = document.getElementById('manualEntry');

      // Hide manual entry message initially
      manualEntry.style.display = 'none';

      // Set up PDF upload button
      uploadBtn.addEventListener('click', function () {
        pdfUpload.click();
      });

      pdfUpload.addEventListener('change', function (e) {
        if (e.target.files.length > 0) {
          uploadedPdfFile = e.target.files[0];

          // Create object URL for the uploaded PDF
          if (uploadedPdfUrl) {
            URL.revokeObjectURL(uploadedPdfUrl);
          }
          uploadedPdfUrl = URL.createObjectURL(uploadedPdfFile);

          // Display uploaded file name
          pdfFileName.textContent = uploadedPdfFile.name;
          pdfFileName.href = uploadedPdfUrl;
          uploadedPdf.style.display = 'block';

          // Extract data from PDF
          extractDataFromPdf(uploadedPdfFile);
        }
      });

      // Function to extract data from PDF
      async function extractDataFromPdf(file) {
        extractionStatus.style.display = 'block';
        extractionStatus.textContent = 'Extracting data from PDF...';
        extractionStatus.className = 'extraction-status';

        dataPreview.style.display = 'none';
        manualEntry.style.display = 'none';

        try {
          const fileReader = new FileReader();
          fileReader.onload = async function () {
            try {
              const typedarray = new Uint8Array(this.result);

              // Configure PDF.js worker
              pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

              // Load the PDF
              const pdf = await pdfjsLib.getDocument(typedarray).promise;
              let fullText = '';

              for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                fullText += pageText + ' ';
              }

              const text = fullText.toLowerCase();

              // Helper to extract values using regex
              const extractValue = (regex) => {
                const match = text.match(regex);
                return match ? parseFloat(match[1]) : null;
              };

              const medicalData = {};

              // Extract each field if present in the text
              const eGFR = extractValue(/egfr[^\d]*(\d+(?:\.\d+)?)/i);
              if (eGFR !== null) medicalData.eGFR = eGFR;

              const ACR = extractValue(/acr[^\d]*(\d+(?:\.\d+)?)/i) || extractValue(/albumin(?:-to-)?creatinine[^\d]*(\d+(?:\.\d+)?)/i);
              if (ACR !== null) medicalData.ACR = ACR;

              const creatinine = extractValue(/creatinine[^\d]*(\d+(?:\.\d+)?)/i);
              if (creatinine !== null) medicalData.creatinine = creatinine;

              const urea = extractValue(/urea[^\d]*(\d+(?:\.\d+)?)/i);
              if (urea !== null) medicalData.urea = urea;

              const hemoglobin = extractValue(/hemoglobin[^\d]*(\d+(?:\.\d+)?)/i) || extractValue(/hb[^\d]*(\d+(?:\.\d+)?)/i);
              if (hemoglobin !== null) medicalData.hemoglobin = hemoglobin;

              // Fill the form with extracted data
              let extractedCount = Object.keys(medicalData).length;
              let previewHTML = '<strong>Data extracted from PDF:</strong><br>';

              for (const [key, value] of Object.entries(medicalData)) {
                const inputField = document.getElementById(key);
                if (inputField) {
                  inputField.value = value;
                  previewHTML += `<div class="data-item"><span>${key}:</span> <span>${value}</span></div>`;
                }
              }

              if (extractedCount > 0) {
                // Show success message and data preview
                extractionStatus.textContent = `Successfully extracted ${extractedCount} data points from PDF!`;
                extractionStatus.className = 'extraction-status extraction-success';

                dataPreview.innerHTML = previewHTML;
                dataPreview.style.display = 'block';
                manualEntry.style.display = 'none';
              } else {
                // Show message that no data was found
                extractionStatus.textContent = 'No medical data found in PDF. Please enter data manually.';
                extractionStatus.className = 'extraction-status extraction-error';
                manualEntry.style.display = 'block';
              }
            } catch (err) {
              console.error("PDF Parsing error:", err);
              extractionStatus.textContent = 'Error parsing PDF structure. Please enter data manually.';
              extractionStatus.className = 'extraction-status extraction-error';
              manualEntry.style.display = 'block';
            }
          };
          fileReader.readAsArrayBuffer(file);
        } catch (error) {
          console.error("File reading error:", error);
          extractionStatus.textContent = 'Error reading PDF file. Please enter data manually.';
          extractionStatus.className = 'extraction-status extraction-error';
          manualEntry.style.display = 'block';
        }
      }
    });

    createBubbles();
  </script>
</body>

</html>
