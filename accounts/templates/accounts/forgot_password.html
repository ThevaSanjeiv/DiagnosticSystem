{% extends 'accounts/base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="card">
    <h2>Reset Password</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">Enter your email
        to receive a reset link.</p>
    <div id="forgot-alert" class="alert hidden"></div>
    <form id="forgot-form" novalidate>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <span class="error-msg" id="err-email"></span>
        </div>

        <button type="submit" class="btn primary">Send Reset Link</button>
        <p class="footer-text"><a href="/login/">Back to Login</a></p>
    </form>
</div>
{% endblock %}
