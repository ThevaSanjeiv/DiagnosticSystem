{% extends 'accounts/base.html' %}
{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="card">
    <h2>Set New Password</h2>
    <div id="reset-alert" class="alert hidden"></div>
    <form id="reset-form" data-token="{{ token }}" novalidate>
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" required>
            <span class="error-msg" id="err-password"></span>
            <small>Must be at least 8 chars, include letters & numbers.</small>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
            <span class="error-msg" id="err-confirm_password"></span>
        </div>

        <button type="submit" class="btn primary">Reset Password</button>
    </form>
</div>
{% endblock %}
