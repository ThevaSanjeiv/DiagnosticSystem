{% extends 'accounts/base.html' %}
{% load static %}
{% block title %}Pneumonia Diagnosis{% endblock %}

{% block content %}
<style>
  body {
    font-family: 'Roboto', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    color: #fff;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #3a1a6d, #000);
  }

  /* Nav override for dark theme */
  .navbar {
    background-color: rgba(0,0,0,0.8);
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    box-sizing: border-box;
  }
  .nav-links a, .nav-brand { color: #ddd; }

  .container-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
  }

  .loader {
    position: relative;
    width: 700px;
    height: 600px;
    transform-style: preserve-3d;
    transform: perspective(500px) rotateX(60deg);
  }

  .aro {
    position: absolute;
    inset: calc(var(--s) * 10px);
    border: 1px solid white;
    background-color: #fff2;
    clip-path: polygon(0 100%, 50% 0, 100% 100%);
    animation: up_and_down 3s infinite ease-in-out both;
    animation-delay: calc(var(--s) * -0.1s);
  }

  @keyframes up_and_down {
    0%, 100% { transform: translateZ(-100px); }
    50% { transform: translateZ(100px); }
  }

  .form-container {
    position: relative;
    background: linear-gradient(to right, #003f4f, #000);
    color: white;
    text-align: center;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    max-width: 450px;
    width: 100%;
    z-index: 10;
    margin-top: 60px;
  }

  .form-container:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
  }

  .form-container h2 {
    font-weight: 700;
    margin-bottom: 20px;
  }

  .form-container p {
    font-size: 0.9em;
    margin-bottom: 25px;
    color: #bbb;
  }

  .form-container input[type="file"] {
    margin-bottom: 20px;
    padding: 10px;
    border: 1px solid #555;
    background: #222;
    color: #fff;
    border-radius: 5px;
    width: calc(100% - 22px);
    font-size: 0.95em;
    cursor: pointer;
  }

  .btn-1, .btn-1 *, .btn-1 :after, .btn-1 :before, .btn-1:after, .btn-1:before {
    border: none;
    box-sizing: border-box;
  }

  .btn-1 {
    border: 1px solid;
    border-radius: 999px;
    box-sizing: border-box;
    display: block;
    font-weight: 900;
    overflow: hidden;
    padding: 1.2rem 3rem;
    position: relative;
    text-transform: uppercase;
    cursor: pointer;
    background-color: #000;
    color: #fff;
    font-family: 'Roboto', sans-serif;
    transition: all 0.3s ease;
  }

  .btn-1 .original {
    background: #ffffff;
    color: #000;
    display: grid;
    inset: 0;
    place-content: center;
    position: absolute;
    transition: transform 0.3s cubic-bezier(0.87, 0, 0.13, 1);
  }

  .btn-1:hover .original {
    transform: translateY(100%);
  }

  .btn-1 .letters {
    display: inline-flex;
  }

  .btn-1 span {
    opacity: 0;
    transform: translateY(-15px);
    transition: transform 0.3s cubic-bezier(0.87, 0, 0.13, 1), opacity 0.3s;
  }

  .btn-1 span:nth-child(2n) {
    transform: translateY(15px);
  }

  .btn-1:hover span {
    opacity: 1;
    transform: translateY(0);
  }

  .btn-1:hover span:nth-child(2) { transition-delay: 0.1s; }
  .btn-1:hover span:nth-child(3) { transition-delay: 0.2s; }
  .btn-1:hover span:nth-child(4) { transition-delay: 0.3s; }
  .btn-1:hover span:nth-child(5) { transition-delay: 0.4s; }
  .btn-1:hover span:nth-child(6) { transition-delay: 0.5s; }

  .loading-spinner {
    display: none;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #3498db;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
    margin-left: 10px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .result {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    display: none;
    font-weight: bold;
  }
</style>

<nav class="navbar">
    <a href="/home/" class="nav-brand">HealthSense AI</a>
    <div class="nav-links">
        <a href="/predict/diabetes/">Diabetes</a>
        <a href="/predict/pneumonia/" style="font-weight: 700;">Pneumonia</a>
        <a href="/predict/ckd/">CKD</a>
        <a href="/profile/" class="profile-icon">👤</a>
    </div>
</nav>

<section class="container-loader">
    <aside class="loader">
        <div style="--s: 0" class="aro"></div>
        <div style="--s: 1" class="aro"></div>
        <div style="--s: 2" class="aro"></div>
        <div style="--s: 3" class="aro"></div>
        <div style="--s: 4" class="aro"></div>
        <div style="--s: 5" class="aro"></div>
        <div style="--s: 6" class="aro"></div>
        <div style="--s: 7" class="aro"></div>
        <div style="--s: 8" class="aro"></div>
        <div style="--s: 9" class="aro"></div>
        <div style="--s: 10" class="aro"></div>
        <div style="--s: 11" class="aro"></div>
        <div style="--s: 12" class="aro"></div>
        <div style="--s: 13" class="aro"></div>
        <div style="--s: 14" class="aro"></div>
    </aside>
</section>

<div class="form-container">
    <h2>X-ray Diagnosis</h2>
    <p>Upload your X-ray image, and our AI-powered system will analyze it for diagnostic insights.</p>
    <form id="xrayForm" enctype="multipart/form-data">
        <input type="file" name="file" id="xrayFile" accept="image/*" required>
        <div style="display: flex; align-items: center; justify-content: center;">
            <button type="submit" class="btn-1">
                <div class="original">Submit</div>
                <div class="letters">
                    <span>S</span>
                    <span>U</span>
                    <span>B</span>
                    <span>M</span>
                    <span>I</span>
                    <span>T</span>
                </div>
            </button>
            <div class="loading-spinner" id="loadingSpinner"></div>
        </div>
    </form>
    
    <div class="result" id="resultDiv"></div>
</div>

<script>
  document.getElementById('xrayForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const fileInput = document.getElementById('xrayFile');
      if(fileInput.files.length === 0) return;
      
      const spinner = document.getElementById('loadingSpinner');
      const resultDiv = document.getElementById('resultDiv');
      
      spinner.style.display = 'inline-block';
      resultDiv.style.display = 'none';
      
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      
      try {
          const response = await fetch('/api/predict/pneumonia/', {
              method: 'POST',
              body: formData
          });
          const result = await response.json();
          
          spinner.style.display = 'none';
          
          if (response.ok) {
              resultDiv.textContent = 'Prediction: ' + result.result;
              resultDiv.style.color = result.result.includes('Pneumonia') ? '#ff5252' : '#4CAF50';
              resultDiv.style.display = 'block';
          } else {
              alert('Error: ' + (result.error || 'Unknown error'));
          }
      } catch(err) {
          spinner.style.display = 'none';
          alert('Network error. Please try again.');
      }
  });
</script>
{% endblock %}
